name: Change Package Name and Release

on:
  workflow_dispatch:
    inputs:
      new_package_name:
        description: '新包名 (例如: com.gudaoweb.app)'
        required: true
        default: 'com.gudaobaiban'
      commit_message:
        description: '提交信息'
        required: true
        default: 'Change package name to com.gudaobaiban'
      release_type:
        description: '发布类型 (pre=预发布版，其他=正式版)'
        required: true
        default: 'pre'

jobs:
  change-package-and-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # 允许推送代码和创建 Release
    env:
      OLD_PACKAGE: "org.michaelbel.myapplication"
      OLD_PATH: "org/michaelbel/myapplication"
      NEW_PACKAGE: "${{ github.event.inputs.new_package_name }}"
      NEW_PATH: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set new path variable
        run: |
          NEW_PATH=$(echo "${{ env.NEW_PACKAGE }}" | tr '.' '/')
          echo "NEW_PATH=$NEW_PATH" >> $GITHUB_ENV

      - name: Create new directory structure
        run: |
          mkdir -p app/src/main/kotlin/${{ env.NEW_PATH }}
          echo "创建新目录: app/src/main/kotlin/${{ env.NEW_PATH }}"

      - name: Copy Kotlin files (if old exists)
        id: copy_kotlin
        run: |
          if [ -d "app/src/main/kotlin/${{ env.OLD_PATH }}" ]; then
            cp -r app/src/main/kotlin/${{ env.OLD_PATH }}/* app/src/main/kotlin/${{ env.NEW_PATH }}/
            echo "copied=true" >> $GITHUB_OUTPUT
          else
            echo "警告: 旧目录不存在，跳过 Kotlin 文件迁移"
            echo "copied=false" >> $GITHUB_OUTPUT
          fi

      - name: Update package declarations
        if: steps.copy_kotlin.outputs.copied == 'true'
        run: |
          find app/src/main/kotlin/${{ env.NEW_PATH }} -name "*.kt" -type f | while read file; do
            sed -i "s/package ${{ env.OLD_PACKAGE }}/package ${{ env.NEW_PACKAGE }}/g" "$file"
            sed -i "s/import ${{ env.OLD_PACKAGE }}\./import ${{ env.NEW_PACKAGE }}\./g" "$file"
            sed -i "s/import ${{ env.OLD_PACKAGE }}$/import ${{ env.NEW_PACKAGE }}/g" "$file"
            sed -i "s/${{ env.OLD_PACKAGE }}\.R/${{ env.NEW_PACKAGE }}\.R/g" "$file"
          done

      - name: Update build.gradle.kts
        run: |
          cp app/build.gradle.kts app/build.gradle.kts.bak
          sed -i "s/namespace\s*=\s*\"${{ env.OLD_PACKAGE }}\"/namespace = \"${{ env.NEW_PACKAGE }}\"/" app/build.gradle.kts
          sed -i "s/applicationId\s*=\s*\"${{ env.OLD_PACKAGE }}\"/applicationId = \"${{ env.NEW_PACKAGE }}\"/" app/build.gradle.kts
          APP_NAME=$(echo "${{ env.NEW_PACKAGE }}" | cut -d'.' -f2)
          sed -i "s/archivesName\.set\s*(\s*\"[^\"]*\"/archivesName.set(\"${APP_NAME^}-v\${android.defaultConfig.versionName}(\${android.defaultConfig.versionCode})\"/" app/build.gradle.kts

      - name: Update AndroidManifest.xml
        run: |
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            sed -i "s/package=\"${{ env.OLD_PACKAGE }}\"/package=\"${{ env.NEW_PACKAGE }}\"/" app/src/main/AndroidManifest.xml
          fi

      - name: Update XML resources
        run: |
          find app/src/main/res -name "*.xml" -type f | while read file; do
            sed -i "s/${{ env.OLD_PACKAGE }}/${{ env.NEW_PACKAGE }}/g" "$file"
          done

      - name: Global replace old package name
        run: |
          echo "=== 全局替换旧包名 ==="
          find . -type f \( -name "*.kt" -o -name "*.xml" -o -name "*.gradle*" -o -name "*.properties" -o -name "*.pro" -o -name "*.java" -o -name "*.kts" \) \
            -not -path "*/build/*" -not -path "*/.git/*" | while read file; do
            sed -i "s/${{ env.OLD_PACKAGE }}/${{ env.NEW_PACKAGE }}/g" "$file"
          done

      - name: Verify no old package name remains
        run: |
          if grep -r "${{ env.OLD_PACKAGE }}" --include="*.kt" --include="*.xml" --include="*.gradle*" --include="*.properties" --include="*.pro" --include="*.java" --include="*.kts" \
            --exclude-dir=build --exclude-dir=.git .; then
            echo "错误: 仍然存在旧包名引用！"
            exit 1
          fi

      - name: Remove old package directory
        if: steps.copy_kotlin.outputs.copied == 'true'
        run: |
          rm -rf app/src/main/kotlin/${{ env.OLD_PATH }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add app/
          if ! git diff --staged --quiet; then
            git commit -m "${{ github.event.inputs.commit_message }}"
            git push origin HEAD:${{ github.ref }}
          else
            echo "无文件修改，跳过提交"
          fi

      - name: Clean build
        run: |
          chmod +x ./gradlew
          ./gradlew clean

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
          echo "APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -1)" >> $GITHUB_ENV

      # 提取版本号
      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep -E 'versionName\s*=\s*"[^"]+"' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E 'versionCode\s*=\s*[0-9]+' app/build.gradle.kts | sed -E 's/.*=\s*([0-9]+).*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "版本: $VERSION_NAME ($VERSION_CODE)"

      # 创建 GitHub Release 并上传 APK
      - name: Create Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}-${{ github.run_id }}
          name: v${{ env.VERSION_NAME }} (build ${{ github.run_id }})
          body: |
            ## 包名已更改为 ${{ env.NEW_PACKAGE }}
            
            **提交信息:** ${{ github.event.inputs.commit_message }}
            
            **构建时间:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
            
            **版本信息:** ${{ env.VERSION_NAME }}
          prerelease: ${{ github.event.inputs.release_type == 'pre' }}
          files: ${{ env.APK_PATH }}
          overwrite: true
          token: ${{ secrets.GITHUB_TOKEN }}
